name: Wealth Management Terraform DevSecOps Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'modules/**'
      - 'environments/**'
      - '.github/workflows/terraform-pipeline.yml'
  pull_request:
    paths:
      - 'modules/**'
      - 'environments/**'

permissions:
  contents: read
  id-token: write

jobs:
  select-environment:
    name: Select Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      tfvars_file: ${{ steps.env.outputs.tfvars_file }}
    steps:
      - name: Set Environment From Branch
        id: env
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "tfvars_file=prod.tfvars.example" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == "refs/heads/uat" ]]; then
            echo "environment=uat" >> $GITHUB_OUTPUT
            echo "tfvars_file=uat.tfvars.example" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "tfvars_file=dev.tfvars.example" >> $GITHUB_OUTPUT
          fi

  terraform-plan:
    name: Security Scan, Validate and Plan
    runs-on: ubuntu-latest
    needs: select-environment

    defaults:
      run:
        working-directory: environments/${{ needs.select-environment.outputs.environment }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint Init
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive

      - name: Install Checkov
        run: pip install checkov
        working-directory: .

      - name: Run Checkov IaC Security Scan
        run: |
          checkov -d ../../ --soft-fail

      - name: Hardcoded Secret Scan Placeholder
        run: |
          echo "Hardcoded secret scanning will be enabled here."
          echo "Recommended tools: Gitleaks or TruffleHog."
          # Example:
          # gitleaks detect --source ../../ --redact
          # For now this step is intentionally passing.

      - name: Terraform Init With Remote Backend
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file=${{ needs.select-environment.outputs.tfvars_file }} -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-${{ needs.select-environment.outputs.environment }}-plan
          path: environments/${{ needs.select-environment.outputs.environment }}/tfplan

  terraform-apply-nonprod:
    name: Terraform Apply Dev/UAT
    runs-on: ubuntu-latest
    needs:
      - select-environment
      - terraform-plan
    if: github.ref != 'refs/heads/main' && github.event_name == 'push'

    defaults:
      run:
        working-directory: environments/${{ needs.select-environment.outputs.environment }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-${{ needs.select-environment.outputs.environment }}-plan
          path: environments/${{ needs.select-environment.outputs.environment }}

      - name: Terraform Init With Remote Backend
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  terraform-apply-prod:
    name: Terraform Apply Production
    runs-on: ubuntu-latest
    needs:
      - select-environment
      - terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Configure GitHub Environment named "production" with required reviewers.
    environment:
      name: production

    defaults:
      run:
        working-directory: environments/prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-prod-plan
          path: environments/prod

      - name: Terraform Init With Remote Backend
        run: terraform init

      - name: Terraform Apply After Manual Approval
        run: terraform apply -auto-approve tfplan
